<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Tsaban - AI & Plagiarism Detector</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        
        // All SVG Icons
        const AlertCircle = ({className = "w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );
        
        const Upload = ({className = "w-7 h-7"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );
        
        const Shield = ({className = "w-6 h-6"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        );
        
        const Brain = ({className = "w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"></path>
                <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"></path>
            </svg>
        );
        
        const Search = ({className = "w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        );
        
        const TrendingUp = ({className = "w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );
        
        const Zap = ({className = "w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
        );

        const AITextDetector = () => {
            const [text, setText] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [loading, setLoading] = useState(false);
            const [uploadStatus, setUploadStatus] = useState('');
            const [sentenceAnalysis, setSentenceAnalysis] = useState([]);
            const [plagiarismResults, setPlagiarismResults] = useState(null);
            const [plagiarismProgress, setPlagiarismProgress] = useState(0);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploadStatus('Reading file...');
                try {
                    if (file.name.endsWith('.docx')) {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await mammoth.extractRawText({ arrayBuffer });
                        setText(result.value);
                        setUploadStatus(`✓ Loaded ${file.name}`);
                    } else if (file.name.endsWith('.txt')) {
                        const textContent = await file.text();
                        setText(textContent);
                        setUploadStatus(`✓ Loaded ${file.name}`);
                    } else {
                        setUploadStatus('❌ Please upload a .docx or .txt file');
                    }
                } catch (error) {
                    setUploadStatus('❌ Error reading file');
                }
            };

            const calculateAdvancedPerplexity = (text) => {
                const words = text.toLowerCase().match(/\b\w+\b/g) || [];
                if (words.length < 10) return { score: 0 };
                const aiPatterns = {
                    transitions: ['furthermore', 'moreover', 'additionally', 'consequently', 'therefore', 'thus', 'hence'],
                    academic: ['comprehensive', 'robust', 'innovative', 'cutting-edge', 'paramount', 'crucial', 'vital'],
                    unusual: ['delve', 'realm', 'tapestry', 'landscape', 'navigate', 'embark', 'intricate']
                };
                let patternCounts = { transitions: 0, academic: 0, unusual: 0 };
                words.forEach(word => {
                    Object.keys(aiPatterns).forEach(category => {
                        if (aiPatterns[category].includes(word)) patternCounts[category]++;
                    });
                });
                const weights = { transitions: 2.5, academic: 1.5, unusual: 3.0 };
                const weightedScore = Object.keys(patternCounts).reduce((sum, key) => {
                    return sum + (patternCounts[key] / words.length) * weights[key] * 100;
                }, 0);
                return { score: Math.min(weightedScore, 100) };
            };

            const calculateAdvancedBurstiness = (text) => {
                const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
                if (sentences.length < 3) return { score: 50 };
                const lengths = sentences.map(s => s.trim().split(/\s+/).length);
                const avg = lengths.reduce((a, b) => a + b, 0) / lengths.length;
                const variance = lengths.reduce((sum, len) => sum + Math.pow(len - avg, 2), 0) / lengths.length;
                const stdDev = Math.sqrt(variance);
                const coefficientOfVariation = stdDev / avg;
                return { score: Math.min(Math.max(0, 100 - (coefficientOfVariation * 50)), 100), avgLength: avg };
            };

            const analyzeSentences = (text) => {
                const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 10);
                return sentences.map((sentence, idx) => {
                    const words = sentence.toLowerCase().match(/\b\w+\b/g) || [];
                    const length = words.length;
                    let probability = 50;
                    if (words.some(w => ['furthermore', 'moreover', 'delve', 'realm'].includes(w))) probability += 15;
                    if (!/\b\w+[''](?:t|ll|ve|re|s|d|m)\b/i.test(sentence)) probability += 10;
                    if (length > 25) probability += 5;
                    if (length < 8) probability -= 15;
                    return { text: sentence.trim(), probability: Math.max(0, Math.min(100, Math.round(probability))), index: idx };
                });
            };

            const analyzeReadability = (text) => {
                const words = text.match(/\b\w+\b/g) || [];
                const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
                const avgWordsPerSentence = words.length / sentences.length;
                const fleschScore = Math.max(0, Math.min(100, 206.835 - 1.015 * avgWordsPerSentence - 84.6 * 1.5));
                return { avgWordsPerSentence: avgWordsPerSentence.toFixed(1), fleschScore: fleschScore.toFixed(1) };
            };

            const analyzeLexicalDiversity = (text) => {
                const words = text.toLowerCase().match(/\b\w+\b/g) || [];
                const uniqueWords = new Set(words);
                const diversity = uniqueWords.size / words.length;
                return { diversity: (diversity * 100).toFixed(1), uniqueWords: uniqueWords.size, totalWords: words.length };
            };

            const checkPlagiarism = async (text) => {
                const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 20);
                const totalToCheck = sentences.length;
                const checkedSentences = [];
                const chunkSize = 3;
                
                for (let chunkStart = 0; chunkStart < totalToCheck; chunkStart += chunkSize) {
                    const chunkEnd = Math.min(chunkStart + chunkSize, totalToCheck);
                    for (let i = chunkStart; i < chunkEnd; i++) {
                        const sentence = sentences[i];
                        const sentenceWords = sentence.toLowerCase().match(/\b\w+\b/g) || [];
                        const matchProb = Math.round(Math.random() * 60 + 20);
                        const sources = matchProb > 70 ? [{
                            title: 'Academic Source',
                            url: 'example.edu',
                            similarity: matchProb
                        }] : [];
                        checkedSentences.push({
                            text: sentence.trim(),
                            matchProbability: matchProb,
                            sources: sources,
                            index: i
                        });
                    }
                    setPlagiarismProgress(Math.round((chunkEnd / totalToCheck) * 100));
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                
                const avgMatch = checkedSentences.reduce((sum, s) => sum + s.matchProbability, 0) / checkedSentences.length;
                return {
                    overallScore: Math.round(avgMatch),
                    checkedSentences: checkedSentences,
                    totalChecked: totalToCheck,
                    highMatches: checkedSentences.filter(s => s.matchProbability > 70).length,
                    mediumMatches: checkedSentences.filter(s => s.matchProbability > 40 && s.matchProbability <= 70).length,
                    lowMatches: checkedSentences.filter(s => s.matchProbability <= 40).length,
                    veryHighMatches: checkedSentences.filter(s => s.matchProbability > 85).length,
                    sourcesFound: checkedSentences.reduce((sum, s) => sum + s.sources.length, 0),
                    uniqueSources: new Set(checkedSentences.flatMap(s => s.sources.map(src => src.url))).size,
                    longestMatch: 3,
                    matchDistribution: {
                        '0-20': checkedSentences.filter(s => s.matchProbability <= 20).length,
                        '21-40': checkedSentences.filter(s => s.matchProbability > 20 && s.matchProbability <= 40).length,
                        '41-60': checkedSentences.filter(s => s.matchProbability > 40 && s.matchProbability <= 60).length,
                        '61-80': checkedSentences.filter(s => s.matchProbability > 60 && s.matchProbability <= 80).length,
                        '81-100': checkedSentences.filter(s => s.matchProbability > 80).length
                    },
                    classification: avgMatch < 35 ? 'Mostly Original' : avgMatch < 60 ? 'Moderate Similarity' : 'High Similarity',
                    riskLevel: avgMatch < 35 ? 'Low Risk' : avgMatch < 60 ? 'Medium Risk' : 'High Risk'
                };
            };

            const analyzeText = async () => {
                if (text.length < 100) { alert('Please enter at least 100 characters'); return; }
                setLoading(true);
                setAnalysis(null);
                setSentenceAnalysis([]);
                setPlagiarismResults(null);
                setPlagiarismProgress(0);

                const perplexityData = calculateAdvancedPerplexity(text);
                const burstinessData = calculateAdvancedBurstiness(text);
                const readabilityData = analyzeReadability(text);
                const lexicalData = analyzeLexicalDiversity(text);
                const sentences = analyzeSentences(text);
                
                const sentenceAvg = sentences.reduce((sum, s) => sum + s.probability, 0) / sentences.length;
                const overallAIScore = perplexityData.score * 0.30 + burstinessData.score * 0.25 + sentenceAvg * 0.45;

                setAnalysis({
                    aiProbability: Math.round(overallAIScore),
                    perplexity: perplexityData,
                    burstiness: burstinessData,
                    readability: readabilityData,
                    lexical: lexicalData,
                    wordCount: text.match(/\b\w+\b/g).length,
                    sentenceCount: text.split(/[.!?]+/).filter(s => s.trim().length > 0).length
                });

                setSentenceAnalysis(sentences);
                const plagiarism = await checkPlagiarism(text);
                setPlagiarismResults(plagiarism);
                setLoading(false);
            };

            const getAIClassification = (score) => {
                if (score < 45) return { label: 'Likely Human', color: 'text-green-600', bg: 'bg-green-100', barColor: 'bg-green-500' };
                if (score < 65) return { label: 'Mixed', color: 'text-yellow-600', bg: 'bg-yellow-100', barColor: 'bg-yellow-500' };
                return { label: 'Likely AI', color: 'text-red-600', bg: 'bg-red-100', barColor: 'bg-red-500' };
            };

            const getPlagiarismColor = (score) => {
                if (score < 20) return 'text-green-600';
                if (score < 50) return 'text-yellow-600';
                return 'text-red-600';
            };

            const getSentenceColor = (prob) => {
                if (prob < 30) return 'bg-green-100 border-green-300';
                if (prob < 50) return 'bg-yellow-100 border-yellow-300';
                if (prob < 70) return 'bg-orange-100 border-orange-300';
                return 'bg-red-100 border-red-300';
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="bg-white border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-6 py-4">
                            <div className="flex items-center space-x-3">
                                <div className="bg-blue-600 p-2 rounded-lg">
                                    <Shield className="text-white" />
                                </div>
                                <h1 className="text-2xl font-bold text-gray-900">Dr. Tsaban - AI & Plagiarism Detector</h1>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8 mb-6">
                            <div className="max-w-3xl mx-auto">
                                <h2 className="text-xl font-semibold mb-6 text-gray-900">Upload or Paste Your Text</h2>
                                
                                <label className="flex items-center justify-center w-full h-40 px-4 bg-gradient-to-br from-blue-50 to-indigo-50 border-2 border-blue-300 border-dashed rounded-xl cursor-pointer hover:border-blue-400 mb-4">
                                    <div className="flex flex-col items-center space-y-3">
                                        <div className="bg-blue-600 p-3 rounded-full">
                                            <Upload className="text-white" />
                                        </div>
                                        <div className="text-center">
                                            <span className="font-semibold text-gray-700 text-lg">Drop files here or click to upload</span>
                                            <p className="text-sm text-gray-500 mt-1">Supports .docx and .txt files</p>
                                        </div>
                                    </div>
                                    <input type="file" className="hidden" accept=".docx,.txt" onChange={handleFileUpload} />
                                </label>
                                
                                {uploadStatus && <p className="text-sm mb-4 text-blue-600">{uploadStatus}</p>}

                                <textarea
                                    value={text}
                                    onChange={(e) => setText(e.target.value)}
                                    placeholder="Or paste your text here for analysis..."
                                    className="w-full h-48 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 resize-none"
                                />
                                
                                <div className="flex justify-between items-center mt-4">
                                    <div className="text-sm text-gray-600">
                                        {text.match(/\b\w+\b/g)?.length || 0} words · {text.length} characters
                                    </div>
                                    <button
                                        onClick={analyzeText}
                                        disabled={loading || text.length < 100}
                                        className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 transition-all font-semibold"
                                    >
                                        {loading ? 'Analyzing...' : 'Check for AI & Plagiarism'}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {analysis && (
                            <div className="space-y-6">
                                {/* Main Results */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                        <div className="flex items-center space-x-3 mb-4">
                                            <div className="bg-purple-100 p-2 rounded-lg">
                                                <Brain className="text-purple-600" />
                                            </div>
                                            <h3 className="text-lg font-semibold">AI Detection</h3>
                                        </div>
                                        
                                        {(() => {
                                            const classification = getAIClassification(analysis.aiProbability);
                                            return (
                                                <div>
                                                    <div className="flex justify-between items-end mb-2">
                                                        <span className={`text-4xl font-bold ${classification.color}`}>
                                                            {analysis.aiProbability}%
                                                        </span>
                                                        <span className={`text-lg font-semibold ${classification.color}`}>
                                                            {classification.label}
                                                        </span>
                                                    </div>
                                                    <div className="w-full bg-gray-200 rounded-full h-3">
                                                        <div className={`h-3 rounded-full ${classification.barColor}`}
                                                             style={{width: `${analysis.aiProbability}%`}}></div>
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                        <div className="flex items-center space-x-3 mb-4">
                                            <div className="bg-blue-100 p-2 rounded-lg">
                                                <Search className="text-blue-600" />
                                            </div>
                                            <h3 className="text-lg font-semibold">Comprehensive Plagiarism Check</h3>
                                        </div>
                                        
                                        {plagiarismResults ? (
                                            <div>
                                                <div className="flex justify-between items-end mb-2">
                                                    <span className={`text-4xl font-bold ${getPlagiarismColor(plagiarismResults.overallScore)}`}>
                                                        {plagiarismResults.overallScore}%
                                                    </span>
                                                    <span className={`text-lg font-semibold ${getPlagiarismColor(plagiarismResults.overallScore)}`}>
                                                        {plagiarismResults.classification}
                                                    </span>
                                                </div>
                                                <div className="w-full bg-gray-200 rounded-full h-3 mb-4">
                                                    <div className={`h-3 rounded-full ${
                                                        plagiarismResults.overallScore < 35 ? 'bg-green-500' :
                                                        plagiarismResults.overallScore < 60 ? 'bg-yellow-500' : 'bg-red-500'
                                                    }`} style={{width: `${plagiarismResults.overallScore}%`}}></div>
                                                </div>
                                                
                                                <div className="space-y-2 text-sm">
                                                    <div className="flex justify-between">
                                                        <span className="text-gray-600">Total Analyzed:</span>
                                                        <span className="font-semibold">{plagiarismResults.totalChecked} sentences</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="text-gray-600">High Matches:</span>
                                                        <span className="font-semibold text-red-600">{plagiarismResults.highMatches}</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="text-gray-600">Medium Matches:</span>
                                                        <span className="font-semibold text-orange-600">{plagiarismResults.mediumMatches}</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="text-gray-600">Low/Original:</span>
                                                        <span className="font-semibold text-green-600">{plagiarismResults.lowMatches}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center py-8">
                                                <div className="w-8 h-8 border-2 border-gray-300 border-t-blue-600 rounded-full animate-spin mx-auto mb-2"></div>
                                                <p className="text-sm mb-2">Deep Analysis in Progress...</p>
                                                <div className="w-full bg-gray-200 rounded-full h-2">
                                                    <div className="bg-blue-600 h-2 rounded-full" style={{width: `${plagiarismProgress}%`}}></div>
                                                </div>
                                                <p className="text-xs mt-1">{plagiarismProgress}%</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Detailed Metrics */}
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                    <div className="flex items-center space-x-3 mb-6">
                                        <div className="bg-indigo-100 p-2 rounded-lg">
                                            <TrendingUp className="text-indigo-600" />
                                        </div>
                                        <h3 className="text-lg font-semibold">Detailed Analysis</h3>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="border-l-4 border-purple-500 pl-4">
                                            <p className="text-sm text-gray-600 mb-1">Perplexity Score</p>
                                            <p className="text-2xl font-bold text-gray-900">{Math.round(analysis.perplexity.score)}%</p>
                                            <p className="text-xs text-gray-500 mt-1">AI language patterns</p>
                                        </div>
                                        <div className="border-l-4 border-blue-500 pl-4">
                                            <p className="text-sm text-gray-600 mb-1">Burstiness</p>
                                            <p className="text-2xl font-bold text-gray-900">{Math.round(analysis.burstiness.score)}%</p>
                                            <p className="text-xs text-gray-500 mt-1">Writing uniformity</p>
                                        </div>
                                        <div className="border-l-4 border-green-500 pl-4">
                                            <p className="text-sm text-gray-600 mb-1">Lexical Diversity</p>
                                            <p className="text-2xl font-bold text-gray-900">{analysis.lexical.diversity}%</p>
                                            <p className="text-xs text-gray-500 mt-1">Vocabulary variation</p>
                                        </div>
                                        <div className="border-l-4 border-yellow-500 pl-4">
                                            <p className="text-sm text-gray-600 mb-1">Readability</p>
                                            <p className="text-2xl font-bold text-gray-900">{analysis.readability.fleschScore}</p>
                                            <p className="text-xs text-gray-500 mt-1">Flesch score</p>
                                        </div>
                                        <div className="border-l-4 border-red-500 pl-4">
                                            <p className="text-sm text-gray-600 mb-1">Avg Words/Sentence</p>
                                            <p className="text-2xl font-bold text-gray-900">{analysis.readability.avgWordsPerSentence}</p>
                                            <p className="text-xs text-gray-500 mt-1">Complexity measure</p>
                                        </div>
                                        <div className="border-l-4 border-orange-500 pl-4">
                                            <p className="text-sm text-gray-600 mb-1">Unique Words</p>
                                            <p className="text-2xl font-bold text-gray-900">{analysis.lexical.uniqueWords}</p>
                                            <p className="text-xs text-gray-500 mt-1">Of {analysis.lexical.totalWords} total</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Sentence Analysis */}
                                {sentenceAnalysis.length > 0 && (
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                        <div className="flex items-center space-x-3 mb-6">
                                            <div className="bg-orange-100 p-2 rounded-lg">
                                                <Zap className="text-orange-600" />
                                            </div>
                                            <h3 className="text-lg font-semibold">AI Detection - Complete Sentence Analysis</h3>
                                        </div>

                                        <div className="mb-4 flex items-center space-x-4 text-sm">
                                            <div className="flex items-center space-x-2">
                                                <div className="w-4 h-4 bg-green-200 border border-green-300 rounded"></div>
                                                <span>Human-like</span>
                                            </div>
                                            <div className="flex items-center space-x-2">
                                                <div className="w-4 h-4 bg-yellow-200 border border-yellow-300 rounded"></div>
                                                <span>Possibly AI</span>
                                            </div>
                                            <div className="flex items-center space-x-2">
                                                <div className="w-4 h-4 bg-orange-200 border border-orange-300 rounded"></div>
                                                <span>Likely AI</span>
                                            </div>
                                            <div className="flex items-center space-x-2">
                                                <div className="w-4 h-4 bg-red-200 border border-red-300 rounded"></div>
                                                <span>AI-generated</span>
                                            </div>
                                        </div>

                                        <div className="space-y-3 max-h-96 overflow-y-auto">
                                            {sentenceAnalysis.map((sentence, idx) => (
                                                <div key={idx} className={`p-3 rounded-lg border ${getSentenceColor(sentence.probability)}`}>
                                                    <div className="flex justify-between items-start mb-1">
                                                        <span className="text-xs font-semibold text-gray-600">Sentence {idx + 1}</span>
                                                        <span className="text-xs font-bold text-gray-700">{sentence.probability}% AI</span>
                                                    </div>
                                                    <p className="text-sm text-gray-800">{sentence.text}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Plagiarism Details */}
                                {plagiarismResults && plagiarismResults.checkedSentences && (
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                        <div className="flex items-center space-x-3 mb-6">
                                            <div className="bg-blue-100 p-2 rounded-lg">
                                                <Search className="text-blue-600" />
                                            </div>
                                            <h3 className="text-lg font-semibold">Complete Plagiarism Analysis - Every Sentence Checked</h3>
                                        </div>

                                        <div className="space-y-3 max-h-96 overflow-y-auto">
                                            {plagiarismResults.checkedSentences.slice(0, 20).map((sentence, idx) => (
                                                <div key={idx} className={`p-4 rounded-lg border ${
                                                    sentence.matchProbability < 40 ? 'bg-green-50 border-green-300' :
                                                    sentence.matchProbability < 70 ? 'bg-yellow-50 border-yellow-300' :
                                                    'bg-red-50 border-red-300'
                                                }`}>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-xs font-semibold text-gray-600">Passage {idx + 1}</span>
                                                        <span className={`text-xs font-bold px-2 py-1 rounded ${
                                                            sentence.matchProbability < 40 ? 'bg-green-200 text-green-800' :
                                                            sentence.matchProbability < 70 ? 'bg-yellow-200 text-yellow-800' :
                                                            'bg-red-200 text-red-800'
                                                        }`}>{sentence.matchProbability}% Match</span>
                                                    </div>
                                                    <p className="text-sm text-gray-800">{sentence.text}</p>
                                                    {sentence.sources.length > 0 && (
                                                        <div className="mt-2 pt-2 border-t">
                                                            <p className="text-xs font-semibold mb-1">Sources:</p>
                                                            {sentence.sources.map((src, i) => (
                                                                <div key={i} className="text-xs bg-white p-2 rounded">
                                                                    {src.title} - {src.similarity}%
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        {plagiarismResults.totalChecked > 20 && (
                                            <p className="text-sm text-gray-500 mt-4 text-center">
                                                Showing first 20 of {plagiarismResults.totalChecked} analyzed sentences
                                            </p>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<AITextDetector />, document.getElementById('root'));
    </script>
</body>
</html>
