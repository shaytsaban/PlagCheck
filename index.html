<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Tsaban ScholarGuard - AI & Plagiarism Fighter</title>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Mammoth for docx -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf',
                            500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a',
                        },

                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .doc-text { font-family: 'Merriweather', serif; line-height: 2.0; font-size: 1.125rem; color: #1e293b; white-space: pre-wrap; }

        .hl-ai-low { background-color: transparent; }
        .hl-ai-medium { background-color: rgba(253, 224, 71, 0.4); border-bottom: 2px solid rgba(253, 224, 71, 1); }
        .hl-ai-high { background-color: rgba(251, 146, 60, 0.4); border-bottom: 2px solid rgba(251, 146, 60, 1); }
        .hl-ai-critical { background-color: rgba(248, 113, 113, 0.4); border-bottom: 2px solid rgba(248, 113, 113, 1); }
        .hl-plag-low { background-color: transparent; }
        .hl-plag-high { background-color: rgba(168, 85, 247, 0.5); border-bottom: 2px solid rgba(168, 85, 247, 1); }

        .sentence-span { position: relative; cursor: pointer; transition: all 0.2s ease-in-out; border-radius: 3px; padding: 0 1px; }
        .sentence-span:hover { filter: brightness(0.95); box-shadow: 0 0 0 2px rgba(0,0,0,0.05); }

        .custom-tooltip {
            position: absolute; z-index: 50; background: #020617; color: #f8fafc; padding: 12px; border-radius: 8px;
            font-size: 0.875rem; font-family: 'Inter', sans-serif; width: 280px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            pointer-events: none; opacity: 0; transform: translateY(10px) scale(0.95); transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .sentence-span:hover .custom-tooltip, .custom-tooltip.forced-show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        @media print {
            body { background-color: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            #root { margin: 0; padding: 0; }
            .report-container { max-width: 100% !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            .summary-page { page-break-after: always; height: 100vh; }
            .doc-text { font-size: 11pt; line-height: 1.8; color: black; }
            .hl-ai-critical { background-color: #fecaca !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; text-decoration: underline; text-decoration-color: #ef4444; }
            .hl-ai-high { background-color: #fed7aa !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; text-decoration: underline; text-decoration-color: #f97316; }
            .hl-ai-medium { background-color: #fef08a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .hl-plag-high { background-color: #e9d5ff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-weight: bold; border: 1px solid #a855f7; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Logo: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>,
            Upload: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Search: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>,
            Printer: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            ExternalLink: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>,
            ShieldCheck: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M9 12l2 2 4-4"></path></svg>,
            BookOpen: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            Globe: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            Activity: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
            Brain: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"></path><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"></path></svg>,
            Check: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        // --- Core Analysis Algorithms ---

        const calculateBurstiness = (sentences) => {
            if (sentences.length < 2) return { score: 50, metrics: null, cv: 0 };
            const lengths = sentences.map(s => (s.match(/\b\w+\b/g) || []).length);
            const mean = lengths.reduce((a, b) => a + b, 0) / lengths.length;
            const variance = lengths.reduce((sum, len) => sum + Math.pow(len - mean, 2), 0) / lengths.length;
            const stdDev = Math.sqrt(variance);
            let cv = (mean > 0) ? (stdDev / mean) : 0;
            let aiScore = 100 - ((cv - 0.15) / (0.6 - 0.15)) * 100;
            return { score: Math.max(0, Math.min(100, aiScore)), cv };
        };

        const AI_WORDS = {
            heavy: ['delve', 'tapestry', 'realm', 'testament', 'demystify', 'unveil', 'crucial', 'vital', 'paramount', 'moreover', 'furthermore', 'nevertheless', 'consequently', 'multifaceted', 'underscore', 'navigate'],
            medium: ['robust', 'comprehensive', 'landscape', 'intricate', 'embark', 'additionally']
        };

        const calculatePerplexityScore = (sentence) => {
            const words = sentence.toLowerCase().match(/\b\w+\b/g) || [];
            if (words.length < 5) return 20;
            let matchScore = 0;
            words.forEach(w => {
                if (AI_WORDS.heavy.includes(w)) matchScore += 30;
                else if (AI_WORDS.medium.includes(w)) matchScore += 15;
            });
            if (words.length >= 12 && words.length <= 22) matchScore += 10;
            if (!/[''](?:t|ll|ve|re|s|d|m)\b/i.test(sentence)) matchScore += 15;
            return Math.min(100, matchScore);
        };

        // --- Strict Quad-Core Search Engines ---
        const fetchWikipediaMatch = async (phrase) => {
            try {
                const query = encodeURIComponent(`"${phrase}"`);
                const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${query}&utf8=&format=json&origin=*`, { signal: AbortSignal.timeout(3000) });
                const data = await res.json();
                if (data.query?.search?.length > 0) {
                    return { type: 'Encyclopedia', title: data.query.search[0].title, url: `https://en.wikipedia.org/wiki/${encodeURIComponent(data.query.search[0].title.replace(/ /g, '_'))}` };
                }
            } catch (e) {} return null;
        };

        const fetchOpenAlexMatch = async (phrase) => {
            try {
                const query = encodeURIComponent(`"${phrase}"`);
                const res = await fetch(`https://api.openalex.org/works?search=${query}&per-page=3`, { signal: AbortSignal.timeout(4000) });
                const data = await res.json();
                if (data.results?.length > 0) {
                    // OpenAlex returns fuzzy matches if exact isn't found. We MUST reconstruct the abstract and verify it client-side.
                    for (const item of data.results) {
                        if (item.abstract_inverted_index) {
                            const words = [];
                            Object.entries(item.abstract_inverted_index).forEach(([word, positions]) => {
                                positions.forEach(pos => { words[pos] = word; });
                            });
                            const abstract = words.join(' ');
                            if (abstract.toLowerCase().replace(/[^a-z0-9]/g, '').includes(phrase.toLowerCase().replace(/[^a-z0-9]/g, ''))) {
                                return { type: 'Academic Paper (OpenAlex)', title: item.title || 'Untitled Publication', url: item.id || item.doi };
                            }
                        }
                    }
                }
            } catch (e) {} return null;
        };

        const fetchDuckDuckGoMatch = async (phrase) => {
            try {
                const query = encodeURIComponent(`"${phrase}"`);
                const targetUrl = `https://html.duckduckgo.com/html/?q=${query}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
                const json = await res.json();
                const html = json.contents;
                
                // DDG falls back to fuzzy indexing if exact quotes fail. We abort if it states NO RESULTS.
                if (html.includes('No results found for') || html.includes('Including results for')) return null;

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const results = doc.querySelectorAll('.result__snippet');
                const urls = doc.querySelectorAll('.result__url');
                
                if (results.length > 0 && urls.length > 0) {
                    let realUrl = urls[0].getAttribute('href');
                    if (realUrl && realUrl.startsWith('//duckduckgo.com/l/?uddg=')) {
                        realUrl = decodeURIComponent(realUrl.split('uddg=')[1].split('&')[0]);
                    } else if (realUrl) {
                        realUrl = "https://" + realUrl.trim();
                    }
                    if (realUrl && !realUrl.includes('wikipedia.org')) {
                        const titleTag = doc.querySelectorAll('.result__title a')[0];
                        const title = titleTag ? titleTag.textContent : new URL(realUrl).hostname;
                        return { type: 'Bing / DDG Web Index', title: title.trim(), url: realUrl };
                    }
                }
            } catch (e) {} return null;
        };

        const fetchYahooMatch = async (phrase) => {
            try {
                const query = encodeURIComponent(`"${phrase}"`);
                const targetUrl = `https://search.yahoo.com/search?p=${query}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
                const json = await res.json();
                const html = json.contents;
                
                // Yahoo proxy anti-fuzzy fallback check
                if (html.includes('We did not find results for') || html.includes('Including results for')) return null;

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const results = doc.querySelectorAll('.algo');
                
                if (results.length > 0) {
                    const aTag = results[0].querySelector('h3 a');
                    if (aTag) {
                        const url = aTag.getAttribute('href');
                        if (url && !url.includes('wikipedia.org')) {
                            return { type: 'Yahoo / Alt Web Index', title: aTag.textContent.trim(), url: url };
                        }
                    }
                }
            } catch (e) {} return null;
        };


        // --- UI Components ---
        const SentenceSpan = ({ sentence, index, mode, aiScore, plagData, activeIndex, setActiveIndex }) => {
            const isActive = activeIndex === index;
            let hlClass = '';
            if (mode === 'ai') {
                if (aiScore > 80) hlClass = 'hl-ai-critical';
                else if (aiScore > 50) hlClass = 'hl-ai-high';
                else if (aiScore > 30) hlClass = 'hl-ai-medium';
                else hlClass = 'hl-ai-low';
            } else if (mode === 'plagiarism') {
                if (plagData) hlClass = 'hl-plag-high';
                else hlClass = 'hl-plag-low';
            }

            return (
                <span 
                    className={`sentence-span ${hlClass} ${isActive ? 'ring-2 ring-brand-500 ring-offset-1 no-print' : ''}`}
                    onMouseEnter={() => setActiveIndex(index)}
                    onMouseLeave={() => setActiveIndex(null)}
                >
                    {sentence}{" "}
                    {isActive && (
                        <div className="custom-tooltip forced-show no-print" style={{ bottom: '100%', left: '50%', transform: 'translateX(-50%) translateY(-8px)' }}>
                            <div className="border-b border-gray-700 pb-2 mb-2">
                                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Analysis Score</span>
                                <div className="flex justify-between items-center">
                                    <span>AI Probability</span>
                                    <span className={`font-bold ${aiScore > 60 ? 'text-red-400' : 'text-green-400'}`}>{Math.round(aiScore)}%</span>
                                </div>
                            </div>
                            {plagData ? (
                                <div className="animate-fade-in">
                                    <span className={`text-[10px] font-bold uppercase tracking-widest block mb-1 flex items-center ${plagData.type === 'Wikipedia' ? 'text-blue-400' : 'text-purple-400'}`}>
                                        <Icons.ExternalLink className="w-3 h-3 mr-1" /> Match: {plagData.type}
                                    </span>
                                    <a href={plagData.url} target="_blank" rel="noreferrer" className="text-white font-medium hover:text-brand-300 transition-colors truncate block text-sm">
                                        {plagData.title}
                                    </a>
                                </div>
                            ) : (
                                <div className="flex items-center text-green-400 text-xs font-semibold">
                                    <svg className="w-3 h-3 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"></polyline></svg> Document Original
                                </div>
                            )}
                        </div>
                    )}
                </span>
            );
        };


        const LandingFeatures = () => (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-12 mb-8">
                <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl relative overflow-hidden group hover:border-brand-500/50 transition-all">
                    <div className="bg-brand-500/10 p-3 rounded-xl inline-block mb-4 text-brand-400 group-hover:scale-110 transition-transform"><Icons.BookOpen className="w-6 h-6" /></div>
                    <h3 className="text-white font-bold mb-2">100M+ Academic Papers</h3>
                    <p className="text-slate-400 text-xs leading-relaxed">Cross-references the massive OpenAlex catalog and Crossref DOIs to catch scholarly and journal plagiarism globally.</p>
                </div>
                <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl relative overflow-hidden group hover:border-purple-500/50 transition-all">
                    <div className="bg-purple-500/10 p-3 rounded-xl inline-block mb-4 text-purple-400 group-hover:scale-110 transition-transform"><Icons.Globe className="w-6 h-6" /></div>
                    <h3 className="text-white font-bold mb-2">Live Web Indexing</h3>
                    <p className="text-slate-400 text-xs leading-relaxed">Bypasses static databases by utilizing real-time proxy engines to scrape search algorithms (DuckDuckGo, Wikipedia) for the freshest hits.</p>
                </div>
                <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl relative overflow-hidden group hover:border-gold-500/50 transition-all">
                    <div className="bg-gold-500/10 p-3 rounded-xl inline-block mb-4 text-gold-400 group-hover:scale-110 transition-transform"><Icons.ShieldCheck className="w-6 h-6" /></div>
                    <h3 className="text-white font-bold mb-2">Zero False Positives</h3>
                    <p className="text-slate-400 text-xs leading-relaxed">Unlike basic AI checkers, we require sequential, 10-word 100% exact phrase overlaps before flagging external copyright violations.</p>
                </div>
                <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl relative overflow-hidden group hover:border-red-500/50 transition-all">
                    <div className="bg-red-500/10 p-3 rounded-xl inline-block mb-4 text-red-400 group-hover:scale-110 transition-transform"><Icons.Activity className="w-6 h-6" /></div>
                    <h3 className="text-white font-bold mb-2">Linguistic NLP Models</h3>
                    <p className="text-slate-400 text-xs leading-relaxed">Examines Perplexity (AI jargon density) and Burstiness variance (sentence length uniformity) to determine synthetic authoring.</p>
                </div>
            </div>
        );


        const AIFinderApp = () => {
            const [text, setText] = useState('');
            const [uploadStatus, setUploadStatus] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisProgress, setAnalysisProgress] = useState(0);
            
            const [sentencesData, setSentencesData] = useState([]);
            const [overallMetrics, setOverallMetrics] = useState(null);
            
            const [viewMode, setViewMode] = useState('input'); // 'input' | 'report'
            const [highlightMode, setHighlightMode] = useState('ai'); // 'ai' | 'plagiarism'
            const [activeSentenceIdx, setActiveSentenceIdx] = useState(null);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploadStatus(`Reading ${file.name}...`);
                try {
                    if (file.name.endsWith('.docx')) {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await mammoth.extractRawText({ arrayBuffer });
                        setText(result.value);
                        setUploadStatus(`✓ Loaded ${file.name}`);
                    } else if (file.name.endsWith('.txt')) {
                        const textContent = await file.text();
                        setText(textContent);
                        setUploadStatus(`✓ Loaded ${file.name}`);
                    } else {
                        setUploadStatus('❌ Please upload a .docx or .txt file');
                    }
                } catch (error) {
                    setUploadStatus('❌ Error reading file');
                }
            };

            const runRobustAnalysis = async () => {
                const wordsOnly = text.match(/\b\w+\b/g) || [];
                if (wordsOnly.length < 15) { alert("Please provide more text to analyze deeply."); return; }
                
                setIsAnalyzing(true);
                setViewMode('report');
                setAnalysisProgress(0);
                
                const rawSentences = text.split(/(?<=[.!?])\s+(?=[A-Z0-9])|(?<=\n+)/);
                const sentences = rawSentences.filter(s => s.trim().length > 0);
                const burstinessData = calculateBurstiness(sentences);
                
                const analyzedSentences = [];
                let totalAiProb = 0;
                let plagiarismCount = 0;
                const sourceMap = new Map();

                for (let i = 0; i < sentences.length; i++) {
                    const s = sentences[i];
                    setAnalysisProgress(Math.round(((i) / sentences.length) * 100));
                    
                    const cleanS = s.trim();
                    if (cleanS.length < 5) {
                        analyzedSentences.push({ text: s, aiScore: 0, plagData: null });
                        continue;
                    }

                    let perplScore = calculatePerplexityScore(cleanS);
                    let finalAiScore = (perplScore * 0.7) + (burstinessData.score * 0.3);
                    
                    let plagData = null;
                    const words = cleanS.match(/\b\w+\b/g) || [];
                    
                    if (words.length >= 8) {
                        const chunk = words.slice(0, 10).join(" ");
                        
                        // Quad-Core API Racing (Concurrent Execution)
                        const results = await Promise.all([
                            fetchWikipediaMatch(chunk),
                            fetchOpenAlexMatch(chunk),
                            fetchDuckDuckGoMatch(chunk),
                            fetchYahooMatch(chunk)
                        ]);
                        
                        // Find the first valid plagiarism match
                        plagData = results.find(r => r !== null) || null;
                        
                        if (plagData) {
                            plagiarismCount++;
                            if (!sourceMap.has(plagData.url)) {
                                sourceMap.set(plagData.url, { ...plagData, count: 1 });
                            } else {
                                sourceMap.get(plagData.url).count += 1;
                            }
                        }
                    }

                    totalAiProb += finalAiScore;
                    analyzedSentences.push({
                        text: s,
                        aiScore: Math.min(100, Math.max(0, finalAiScore)),
                        plagData: plagData
                    });
                }
                
                setSentencesData(analyzedSentences);
                setOverallMetrics({
                    avgAiProb: Math.round(totalAiProb / Math.max(1, sentences.length)),
                    plagiarismPercent: Math.round((plagiarismCount / Math.max(1, sentences.length)) * 100),
                    burstiness: burstinessData,
                    totalWords: wordsOnly.length,
                    totalSentences: sentences.length,
                    plagiarismHits: plagiarismCount,
                    matchedSources: Array.from(sourceMap.values()).sort((a,b) => b.count - a.count)
                });

                setAnalysisProgress(100);
                setIsAnalyzing(false);
            };

                                                                        </td>

                                                        </table>
